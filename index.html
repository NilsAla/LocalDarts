<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LocalDarts</title>
    <style>
        /* --- CSS VARIABLEN FÜR FARBWECHSEL --- */
        :root {
            --accent: #FF7338;
            --accent-hover: #ff8554;
            --accent-rgb: 255, 115, 56;
            --throw-color: #00bfff;
        }

        /* --- CORE STYLES --- */
        body { font-family: 'Segoe UI', Roboto, sans-serif; text-align: center; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }
        
        h1 { color: var(--accent); margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(var(--accent-rgb), 0.3); transition: color 0.3s, text-shadow 0.3s; }
        
        /* --- SCREENS --- */
        #setup-screen { display: block; max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        #game-screen { display: none; }

        /* --- SETUP BEREICH --- */
        .setup-group { margin-bottom: 20px; text-align: left; }
        .setup-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #aaa; }
        .setup-group input[type="text"], .setup-group select { width: 100%; padding: 12px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: border-color 0.2s; }
        .setup-group input[type="text"]:focus, .setup-group select:focus { outline: none; border-color: var(--accent); }

        input::-webkit-calendar-picker-indicator { opacity: 1; cursor: pointer; filter: invert(0.8); }
        
        #player-inputs-container { display: flex; flex-direction: column; }
        
        .start-btn { width: 100%; background: var(--accent); color: #000; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.4); }
        .start-btn:hover { background: var(--accent-hover); transform: scale(1.02); }

        .stop-menu-btn { width: 100%; background: #2a2a2a; color: #ff5252; padding: 15px; font-size: 16px; font-weight: bold; border: 2px solid #444; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .stop-menu-btn:hover { background: #333; border-color: #ff5252; }

        /* --- CONTROLS (STICKY TOP) --- */
        .controls { position: sticky; top: 0; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(8px); padding: 15px 0; margin-bottom: 20px; border-bottom: 1px solid #333; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; z-index: 40; }
        
        button.action-btn { background: #333; color: #fff; border: 2px solid #555; padding: 12px 20px; font-size: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        button.action-btn:hover { background: #444; border-color: var(--accent); transform: translateY(-2px); color: var(--accent); }
        button.action-btn.danger:hover { border-color: #ff5252; color: #ff5252; }
        button.action-btn.warn:hover { border-color: #ff9800; color: #ff9800; }

        /* --- GAME BEREICH --- */
        .board { display: flex; justify-content: center; gap: 30px; align-items: flex-start; flex-wrap: wrap; }
        .player { padding: 30px; border: 3px solid #333; border-radius: 20px; width: 280px; background: #1e1e1e; transition: all 0.4s ease; position: relative; display: flex; flex-direction: column; min-height: 400px; margin-bottom: 20px; }
        
        .active { border-color: var(--accent); background: #262626; transform: scale(1.05); box-shadow: 0 10px 40px rgba(var(--accent-rgb), 0.2); z-index: 10; }
        
        .throwing-badge { display: none; position: absolute; top: 15px; right: 15px; background: var(--throw-color); color: #000; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: background 0.3s; }
        .active .throwing-badge { display: block; }

        .player h2 { margin-top: 0; font-size: 22px; color: #ccc; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score { font-size: 80px; font-weight: 900; margin: 10px 0; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Aktuelle Darts */
        .dart-history { display: flex; justify-content: center; gap: 10px; min-height: 40px; margin-top: 10px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .dart-badge { background: #444; padding: 8px 12px; border-radius: 8px; font-size: 16px; font-weight: bold; color: var(--accent); border: 1px solid #555; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: color 0.3s; }
        .dart-badge.miss { color: #ff9800; border-color: #ff9800; }
        .dart-badge.bust { color: #ff5252; border-color: #ff5252; }
        .bust-text { color: #ff5252 !important; }

        /* Vergangene Darts (Historie) */
        .past-history { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; justify-content: flex-end; }
        .hist-row { display: flex; justify-content: center; gap: 5px; opacity: 0.6; }
        .hist-badge { background: #2a2a2a; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #aaa; border: 1px solid #444; width: 40px; text-align: center; }
        .hist-badge.miss { color: #ff9800; border-color: #795516; }
        .hist-badge.bust { color: #ff5252; border-color: #792525; }

        /* --- WURF POPUP --- */
        #dart-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; pointer-events: none; z-index: 200; font-size: 180px; font-weight: 900; text-shadow: 0 15px 40px rgba(0,0,0,0.9); transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.1s; }
        .popup-good { color: var(--accent); text-shadow: 0 0 30px rgba(var(--accent-rgb), 0.5), 0 15px 40px rgba(0,0,0,0.9); }
        .popup-bad { color: #ff5252; }
        .popup-miss { color: #ff9800; }

        /* --- MODAL (WURF EDITOR) --- */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(5px); }
        #edit-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); width: 350px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); transition: border-color 0.3s; }
        #edit-modal h3 { margin-top: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .modal-section { margin-bottom: 20px; }
        .modal-section select { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; font-size: 16px; }
        .mult-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .mult-btn { flex: 1; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .mult-btn.active { background: var(--accent); color: #000; border-color: var(--accent); transition: background 0.3s, border-color 0.3s; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .num-btn { padding: 12px 0; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .num-btn:hover { background: #444; border-color: var(--accent); color: var(--accent); }
        .num-btn.special { background: #424242; }
        .num-btn.special:hover { background: #555; border-color: var(--accent); }
        .close-modal-btn { width: 100%; padding: 12px; background: #ff5252; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .close-modal-btn:hover { background: #ff7373; }

        /* --- BIG STATUS BANNER --- */
        #status-banner { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 0; font-size: 36px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; display: flex; justify-content: center; align-items: center; z-index: 50; transition: background 0.3s, color 0.3s; color: #121212; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        #api-indicator { position: absolute; left: 20px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: bold; opacity: 0.8; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        .dot.on { background: #fff; box-shadow: 0 0 10px #fff; }
        .dot.off { background: #555; }
        .status-throw { background: var(--throw-color); transition: background 0.3s; }
        .status-takeout { background: #ffeb3b; }
        .status-takeout-progress { background: #ff9800; }
        .status-stop { background: #ff5252; color: #fff !important; }
        .status-offline { background: #2a2a2a; color: #777 !important; }

        #btn-start-board { display: none; margin-left: 30px; padding: 10px 25px; font-size: 18px; font-weight: bold; background: #fff; color: #ff5252; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s; }
        #btn-start-board:hover { transform: scale(1.05); }

        /* --- TOUCH ON-SCREEN KEYBOARD (OSK) --- */
        #osk { position: fixed; bottom: -400px; left: 0; width: 100%; background: #1a1a1a; border-top: 3px solid var(--accent); padding: 15px 5px; box-sizing: border-box; z-index: 1000; transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        #osk.show { bottom: 0; }
        .osk-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .osk-btn { background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; padding: 15px 0; font-size: 20px; font-weight: bold; cursor: pointer; flex: 1; max-width: 65px; touch-action: manipulation; user-select: none; }
        .osk-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }
        .osk-btn.wide { max-width: 100px; font-size: 16px; background: #444; }
        .osk-btn.space { max-width: 300px; }
        .osk-btn.action { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>

    <h1 id="app-title">LOCAL X01 TRACKER</h1>
    
    <div id="setup-screen">
        <div style="display: flex; gap: 15px;">
            <div class="setup-group" style="flex: 1;">
                <label id="lbl-lang">Sprache / Language</label>
                <select id="input-lang" onchange="changeLang()">
                    <option value="de" selected>Deutsch</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setup-group" style="flex: 1;">
                <label id="lbl-themeColor">Akzentfarbe</label>
                <select id="input-theme-color" onchange="applyColor(); saveSetupState();">
                    <option value="orange" selected>Orange</option>
                    <option value="green">Grün / Green</option>
                </select>
            </div>
        </div>
        
        <div class="setup-group">
            <label id="lbl-numPlayers">Anzahl Spieler</label>
            <select id="input-numPlayers" onchange="generatePlayerInputs(); saveSetupState();">
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
            </select>
        </div>

        <div id="player-inputs-container"></div>
        <datalist id="known-players-list"></datalist>

        <div class="setup-group">
            <label id="lbl-score">Spielvariante</label>
            <select id="input-score" onchange="saveSetupState()">
                <option value="301">301</option>
                <option value="501" selected>501</option>
                <option value="701">701</option>
            </select>
        </div>
        <div class="setup-group">
            <label id="lbl-out">Out-Regel</label>
            <select id="input-out" onchange="saveSetupState()">
                <option value="straight" id="opt-straight">Straight Out</option>
                <option value="double" id="opt-double" selected>Double Out</option>
            </select>
        </div>
        
        <button class="start-btn" id="btn-start" onclick="startGame()">SPIEL STARTEN</button>
        <button class="stop-menu-btn" id="btn-stop-menu" onclick="stopAutodartsBoard()">🛑 ERKENNUNG STOPPEN</button>
    </div>

    <div id="game-screen">
        <div class="controls">
            <button class="action-btn" onclick="addDart(0, 1, 'MISS')">❌ MISS (0)</button>
            <button class="action-btn warn" id="btn-edit" onclick="openEditModal()">✏️ KORRIGIEREN</button>
            <button class="action-btn warn" id="btn-reset" onclick="resetTurn()">🔄 AUFNAHME NEU</button>
            <button class="action-btn" id="btn-next" onclick="forceNextPlayer()">⏭️ NÄCHSTER SPIELER</button>
            <button class="action-btn danger" id="btn-board-reset" onclick="resetAutodartsBoard()">🔌 BOARD RESET</button>
            <button class="action-btn danger" id="btn-menu" onclick="resetToMenu()">⚙️ MENÜ</button>
        </div>
        <div class="board" id="game-board"></div>
    </div>

    <div id="dart-popup">T20</div>

    <div id="overlay">
        <div id="edit-modal">
            <h3 id="modal-title">Wurf editieren</h3>
            <div class="modal-section">
                <select id="edit-dart-index"></select>
            </div>
            <div class="mult-tabs">
                <button class="mult-btn active" id="btn-mult-1" onclick="setEditMult(1)">Single</button>
                <button class="mult-btn" id="btn-mult-2" onclick="setEditMult(2)">Double</button>
                <button class="mult-btn" id="btn-mult-3" onclick="setEditMult(3)">Triple</button>
            </div>
            <div class="num-grid" id="num-grid"></div>
            <button class="close-modal-btn" id="btn-cancel" onclick="closeEditModal()">Abbrechen</button>
        </div>
    </div>

    <div id="status-banner" class="status-offline">
        <div id="api-indicator">
            <span id="api-dot" class="dot off"></span>
            <span id="api-text">API OFFLINE</span>
        </div>
        <span id="board-status-text">SUCHE BOARD...</span>
        
        <button id="btn-start-board" onclick="startAutodartsBoard()">▶️ BOARD STARTEN</button>
    </div>

    <div id="osk">
        <div class="osk-row">
            <button class="osk-btn" onclick="oskType('1')">1</button>
            <button class="osk-btn" onclick="oskType('2')">2</button>
            <button class="osk-btn" onclick="oskType('3')">3</button>
            <button class="osk-btn" onclick="oskType('4')">4</button>
            <button class="osk-btn" onclick="oskType('5')">5</button>
            <button class="osk-btn" onclick="oskType('6')">6</button>
            <button class="osk-btn" onclick="oskType('7')">7</button>
            <button class="osk-btn" onclick="oskType('8')">8</button>
            <button class="osk-btn" onclick="oskType('9')">9</button>
            <button class="osk-btn" onclick="oskType('0')">0</button>
        </div>
        <div class="osk-row">
            <button class="osk-btn" onclick="oskType('Q')">Q</button>
            <button class="osk-btn" onclick="oskType('W')">W</button>
            <button class="osk-btn" onclick="oskType('E')">E</button>
            <button class="osk-btn" onclick="oskType('R')">R</button>
            <button class="osk-btn" onclick="oskType('T')">T</button>
            <button class="osk-btn" onclick="oskType('Z')">Z</button>
            <button class="osk-btn" onclick="oskType('U')">U</button>
            <button class="osk-btn" onclick="oskType('I')">I</button>
            <button class="osk-btn" onclick="oskType('O')">O</button>
            <button class="osk-btn" onclick="oskType('P')">P</button>
        </div>
        <div class="osk-row">
            <button class="osk-btn" onclick="oskType('A')">A</button>
            <button class="osk-btn" onclick="oskType('S')">S</button>
            <button class="osk-btn" onclick="oskType('D')">D</button>
            <button class="osk-btn" onclick="oskType('F')">F</button>
            <button class="osk-btn" onclick="oskType('G')">G</button>
            <button class="osk-btn" onclick="oskType('H')">H</button>
            <button class="osk-btn" onclick="oskType('J')">J</button>
            <button class="osk-btn" onclick="oskType('K')">K</button>
            <button class="osk-btn" onclick="oskType('L')">L</button>
        </div>
        <div class="osk-row">
            <button class="osk-btn" onclick="oskType('Y')">Y</button>
            <button class="osk-btn" onclick="oskType('X')">X</button>
            <button class="osk-btn" onclick="oskType('C')">C</button>
            <button class="osk-btn" onclick="oskType('V')">V</button>
            <button class="osk-btn" onclick="oskType('B')">B</button>
            <button class="osk-btn" onclick="oskType('N')">N</button>
            <button class="osk-btn" onclick="oskType('M')">M</button>
            <button class="osk-btn wide" onclick="oskBack()">⌫</button>
        </div>
        <div class="osk-row">
            <button class="osk-btn wide" onclick="oskClear()">CLEAR</button>
            <button class="osk-btn space" onclick="oskType(' ')">SPACE</button>
            <button class="osk-btn wide action" onclick="oskClose()">OK</button>
        </div>
    </div>

    <script>
        // API Base URLs
        const API_BASE = "http://127.0.0.1:3180/api";
        const API_STATE = API_BASE + "/state";
        const API_START = API_BASE + "/start";
        const API_RESET = API_BASE + "/reset"; 
        const API_STOP = API_BASE + "/stop"; 

        const dict = {
            de: {
                lblLang: "Sprache / Language", lblThemeColor: "Akzentfarbe", optOrange: "Orange", optGreen: "Grün",
                lblNumPlayers: "Anzahl Spieler", defaultPlayer: "Spieler",
                lblScore: "Spielvariante", lblOut: "Out-Regel", btnStart: "SPIEL STARTEN",
                badgeThrow: "WIRFT", btnEdit: "✏️ KORRIGIEREN", btnReset: "🔄 AUFNAHME NEU",
                btnNext: "⏭️ NÄCHSTER SPIELER", btnMenu: "⚙️ MENÜ", btnBoardReset: "🔌 BOARD RESET",
                modalTitle: "Wurf editieren", btnCancel: "Abbrechen",
                statSearch: "SUCHE BOARD...", statThrow: "WIRFT...", statTakeout: "PFEILE ZIEHEN", 
                statTakeoutProgress: "ZIEHT GERADE...", statStop: "GESTOPPT",
                alertWin: "hat das Leg gewonnen!", alertNoDarts: "Es wurden noch keine Pfeile in dieser Aufnahme geworfen.",
                alertConfirmReset: "Komplette Aufnahme löschen und neu werfen?", dartPrefix: "Pfeil",
                alertConfirmMenu: "Spiel wirklich abbrechen und zum Menü zurückkehren?", 
                alertConfirmBoardReset: "Soll das Kameratracking des Boards wirklich neu gestartet werden?",
                btnStartBoard: "▶️ BOARD STARTEN", btnStopBoard: "🛑 ERKENNUNG STOPPEN"
            },
            en: {
                lblLang: "Language / Sprache", lblThemeColor: "Accent Color", optOrange: "Orange", optGreen: "Green",
                lblNumPlayers: "Number of Players", defaultPlayer: "Player",
                lblScore: "Game Mode", lblOut: "Out Rule", btnStart: "START GAME",
                badgeThrow: "THROWING", btnEdit: "✏️ EDIT", btnReset: "🔄 RESET TURN",
                btnNext: "⏭️ NEXT PLAYER", btnMenu: "⚙️ MENU", btnBoardReset: "🔌 BOARD RESET",
                modalTitle: "Edit Throw", btnCancel: "Cancel",
                statSearch: "SEARCHING BOARD...", statThrow: "THROWING...", statTakeout: "TAKEOUT", 
                statTakeoutProgress: "TAKEOUT IN PROGRESS...", statStop: "STOPPED",
                alertWin: "won the leg!", alertNoDarts: "No darts thrown in this turn yet.",
                alertConfirmReset: "Delete entire turn and throw again?", dartPrefix: "Dart",
                alertConfirmMenu: "Really abort game and return to menu?",
                alertConfirmBoardReset: "Do you really want to restart the camera tracking?",
                btnStartBoard: "▶️ START BOARD", btnStopBoard: "🛑 STOP RECOGNITION"
            }
        };

        let lang = "de"; 
        let gameActive = false;
        let isEditing = false;
        let currentEditMult = 1;
        let popupTimeout;
        let lastRawStatus = ""; 
        
        let knownPlayers = [];
        let settings = { startScore: 501, outRule: "double", numPlayers: 2, playerNames: [], themeColor: "orange" };
        let gameState = { scores: {}, activePlayer: 1, scoreAtStartOfTurn: 501, dartsThisTurn: [], isBust: false, history: {} };
        let lastApiData = null;

        // --- ON-SCREEN KEYBOARD LOGIK (GEFIXT) ---
        let activeInput = null;
        let replaceNext = false; 

        function openOsk(inputEl) {
            // FIX: Nur wenn ein WIRKLICH ANDERES Feld angeklickt wird, aktivieren wir "Überschreiben"
            if (activeInput !== inputEl) {
                replaceNext = true;
                inputEl.select(); // Text einmal initial markieren
            }
            activeInput = inputEl;
            
            document.getElementById('osk').classList.add('show');
            setTimeout(() => {
                inputEl.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 300);
        }

        function oskClose() {
            document.getElementById('osk').classList.remove('show');
            activeInput = null;
            saveSetupState(); 
        }

        function oskType(char) {
            if (!activeInput) return;
            
            if (replaceNext) {
                activeInput.value = char;
                replaceNext = false;
            } else {
                activeInput.value += char;
            }
            
            // Fokus behalten, das triggert onfocus, aber da activeInput == inputEl ist, 
            // überschreibt er jetzt nichts mehr ungewollt!
            activeInput.focus();
            let len = activeInput.value.length;
            activeInput.setSelectionRange(len, len);
            
            saveSetupState();
        }

        function oskBack() {
            if (!activeInput) return;
            
            if (replaceNext) {
                activeInput.value = "";
                replaceNext = false;
            } else {
                activeInput.value = activeInput.value.slice(0, -1);
            }
            
            activeInput.focus();
            let len = activeInput.value.length;
            activeInput.setSelectionRange(len, len);
            
            saveSetupState();
        }

        function oskClear() {
            if (!activeInput) return;
            activeInput.value = "";
            replaceNext = false;
            activeInput.focus();
            saveSetupState();
        }

        // --- INIT & LOCAL STORAGE FUNKTIONEN ---
        function initNumGrid() {
            const grid = document.getElementById('num-grid');
            for(let i=1; i<=20; i++) grid.innerHTML += `<button class="num-btn" onclick="saveEditedDart(${i})">${i}</button>`;
            grid.innerHTML += `<button class="num-btn special" onclick="saveEditedDart(25)">Bull</button>`;
            grid.innerHTML += `<button class="num-btn special" onclick="saveEditedDart(0)">Miss</button>`;
        }
        initNumGrid();

        function updateDatalist() {
            const dl = document.getElementById('known-players-list');
            dl.innerHTML = '';
            knownPlayers.forEach(p => { dl.innerHTML += `<option value="${p}">`; });
        }

        function applyColor() {
            const color = document.getElementById('input-theme-color').value;
            const root = document.documentElement;
            
            if (color === 'green') {
                root.style.setProperty('--accent', '#00e676');
                root.style.setProperty('--accent-hover', '#00c853');
                root.style.setProperty('--accent-rgb', '0, 230, 118');
            } else {
                root.style.setProperty('--accent', '#FF7338');
                root.style.setProperty('--accent-hover', '#ff8554');
                root.style.setProperty('--accent-rgb', '255, 115, 56');
            }
        }

        function saveSetupState() {
            settings.numPlayers = parseInt(document.getElementById('input-numPlayers').value);
            settings.startScore = parseInt(document.getElementById('input-score').value);
            settings.outRule = document.getElementById('input-out').value;
            settings.themeColor = document.getElementById('input-theme-color').value;
            settings.playerNames = [];
            
            for (let i = 1; i <= settings.numPlayers; i++) {
                let input = document.getElementById(`input-name${i}`);
                if(input) settings.playerNames[i] = input.value;
            }
            
            localStorage.setItem('ad_settings', JSON.stringify(settings));
            localStorage.setItem('ad_lang', lang);
        }

        function saveGameState() {
            localStorage.setItem('ad_gameState', JSON.stringify(gameState));
            localStorage.setItem('ad_gameActive', gameActive);
        }

        function generatePlayerInputs() {
            const container = document.getElementById('player-inputs-container');
            const num = parseInt(document.getElementById('input-numPlayers').value);
            
            let currentNames = [];
            for (let i = 1; i <= 6; i++) {
                let input = document.getElementById(`input-name${i}`);
                if (input) currentNames[i] = input.value;
                else if (settings.playerNames && settings.playerNames[i]) currentNames[i] = settings.playerNames[i];
            }

            container.innerHTML = '';
            for (let i = 1; i <= num; i++) {
                let defaultName = currentNames[i] || `${dict[lang].defaultPlayer} ${i}`;
                
                // HTML für die Inputs komplett entschlackt (onfocus macht jetzt den smarten check)
                container.innerHTML += `
                    <div class="setup-group">
                        <label>${dict[lang].defaultPlayer} ${i}</label>
                        <input type="text" id="input-name${i}" value="${defaultName}" 
                            list="known-players-list" autocomplete="off"
                            oninput="replaceNext=false; saveSetupState()"
                            onfocus="openOsk(this)"
                            onclick="if(this.value.trim().toLowerCase().startsWith('${dict[lang].defaultPlayer.toLowerCase()}')) { this.value=''; replaceNext=false; }">
                    </div>
                `;
            }
        }

        function changeLang() {
            lang = document.getElementById('input-lang').value;
            const t = dict[lang];
            
            document.getElementById('lbl-lang').innerText = t.lblLang;
            document.getElementById('lbl-themeColor').innerText = t.lblThemeColor;
            
            const colorSelect = document.getElementById('input-theme-color');
            colorSelect.options[0].text = t.optOrange; 
            colorSelect.options[1].text = t.optGreen;  

            document.getElementById('lbl-numPlayers').innerText = t.lblNumPlayers;
            document.getElementById('lbl-score').innerText = t.lblScore;
            document.getElementById('lbl-out').innerText = t.lblOut;
            document.getElementById('btn-start').innerText = t.btnStart;
            document.getElementById('btn-stop-menu').innerText = t.btnStopBoard;
            document.getElementById('btn-edit').innerText = t.btnEdit;
            document.getElementById('btn-reset').innerText = t.btnReset;
            document.getElementById('btn-next').innerText = t.btnNext;
            document.getElementById('btn-menu').innerText = t.btnMenu;
            document.getElementById('btn-board-reset').innerText = t.btnBoardReset;
            document.getElementById('modal-title').innerText = t.modalTitle;
            document.getElementById('btn-cancel').innerText = t.btnCancel;
            
            generatePlayerInputs(); 
            saveSetupState();
            updateStatusText(lastRawStatus); 
        }

        // --- API BOARD STEUERUNG ---
        async function startAutodartsBoard() {
            try {
                const response = await fetch(API_START, { 
                    method: "PUT",
                    headers: { "Accept": "application/json, text/plain, */*" }
                });
                if (response.ok) { console.log("Start-Signal (PUT) erfolgreich gesendet!"); } 
                else { alert("Konnte das Board nicht starten. Fehlercode: " + response.status); }
            } catch (err) {
                alert("Keine Verbindung zum Board Manager auf Port 3180.");
            }
        }

        async function stopAutodartsBoard() {
            try {
                const response = await fetch(API_STOP, { 
                    method: "PUT",
                    headers: { "Accept": "application/json, text/plain, */*" }
                });
                if (response.ok) { console.log("Stop-Signal (PUT) erfolgreich gesendet!"); } 
                else { alert("Konnte das Board nicht stoppen. Fehlercode: " + response.status); }
            } catch (err) {
                alert("Keine Verbindung zum Board Manager auf Port 3180.");
            }
        }

        async function resetAutodartsBoard() {
            if (!confirm(dict[lang].alertConfirmBoardReset)) return;
            try {
                const response = await fetch(API_RESET, { 
                    method: "POST",
                    headers: { "Accept": "application/json, text/plain, */*" }
                });
                if (response.ok) { console.log("Reset-Signal (POST) erfolgreich gesendet!"); } 
                else { alert("Konnte das Board nicht resetten. Fehlercode: " + response.status); }
            } catch (err) {
                alert("Keine Verbindung zum Board Manager auf Port 3180.");
            }
        }

        // --- POPUP FUNKTION ---
        function triggerPopup(name, isBust) {
            const popup = document.getElementById('dart-popup');
            popup.innerText = isBust ? "BUST!" : name;
            popup.className = isBust ? "popup-bad" : (name === "MISS" ? "popup-miss" : "popup-good");
            popup.style.transform = "translate(-50%, -50%) scale(1)";
            popup.style.opacity = "1";
            clearTimeout(popupTimeout);
            popupTimeout = setTimeout(() => {
                popup.style.transform = "translate(-50%, -50%) scale(1.5)";
                popup.style.opacity = "0";
            }, 1200);
        }

        // --- SPIEL START & BOARD GENERIERUNG ---
        function buildBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            for (let i = 1; i <= settings.numPlayers; i++) {
                let pName = settings.playerNames[i] || `${dict[lang].defaultPlayer} ${i}`;
                
                board.innerHTML += `
                    <div id="player${i}" class="player">
                        <div class="throwing-badge" id="badge-throw${i}">${dict[lang].badgeThrow}</div>
                        <h2 id="name${i}">${pName.toUpperCase()}</h2>
                        <div class="score" id="score${i}">${gameState.scores[i]}</div>
                        <div class="dart-history" id="history${i}"></div>
                        <div class="past-history" id="past-history${i}"></div>
                    </div>
                `;
            }
        }

        function startGame() {
            oskClose(); 
            
            settings.numPlayers = parseInt(document.getElementById('input-numPlayers').value);
            settings.startScore = parseInt(document.getElementById('input-score').value);
            settings.outRule = document.getElementById('input-out').value;
            settings.playerNames = [];

            gameState.scores = {};
            gameState.history = {};
            
            for (let i = 1; i <= settings.numPlayers; i++) {
                let rawName = document.getElementById(`input-name${i}`).value.trim();
                let pName = (rawName || `${dict[lang].defaultPlayer} ${i}`).toUpperCase();
                settings.playerNames[i] = pName;
                
                if (pName && !pName.startsWith("SPIELER ") && !pName.startsWith("PLAYER ")) {
                    if (!knownPlayers.includes(pName)) {
                        knownPlayers.push(pName);
                    }
                }
                
                gameState.scores[i] = settings.startScore;
                gameState.history[i] = [];
            }

            localStorage.setItem('ad_knownPlayers', JSON.stringify(knownPlayers));
            updateDatalist();
            saveSetupState(); 

            gameState.activePlayer = 1;
            gameState.scoreAtStartOfTurn = settings.startScore;
            gameState.dartsThisTurn = [];
            gameState.isBust = false;
            
            buildBoard();
            
            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('game-screen').style.display = "block";
            
            window.scrollTo(0, 0);
            gameActive = true;
            updateUI(); 
        }

        function resetToMenu() {
            if (confirm(dict[lang].alertConfirmMenu)) {
                gameActive = false;
                saveGameState(); 
                document.getElementById('game-screen').style.display = "none";
                document.getElementById('setup-screen').style.display = "block";
            }
        }

        // --- API POLLING & BANNER UPDATE ---
        function updateStatusText(rawStatus) {
            const statusTextEl = document.getElementById('board-status-text');
            const statusBanner = document.getElementById('status-banner');
            const btnStartBoard = document.getElementById('btn-start-board');
            
            btnStartBoard.style.display = "none";

            if (rawStatus === "Takeout") {
                statusTextEl.innerText = dict[lang].statTakeout;
                statusBanner.className = "status-takeout";
            } else if (rawStatus === "Takeout in progress" || rawStatus === "Takeout-in-progress") {
                statusTextEl.innerText = dict[lang].statTakeoutProgress;
                statusBanner.className = "status-takeout-progress";
            } else if (rawStatus === "Stop" || rawStatus === "Idle" || rawStatus === "Stopped") {
                statusTextEl.innerText = dict[lang].statStop;
                statusBanner.className = "status-stop";
                
                btnStartBoard.innerText = dict[lang].btnStartBoard;
                btnStartBoard.style.display = "inline-block";
                
            } else if (rawStatus === "Offline") {
                statusTextEl.innerText = dict[lang].statSearch;
                statusBanner.className = "status-offline";
            } else {
                statusTextEl.innerText = dict[lang].statThrow;
                statusBanner.className = "status-throw";
            }
        }

        async function update() {
            try {
                const res = await fetch(API_STATE);
                const data = await res.json();
                
                document.getElementById('api-dot').className = "dot on";
                document.getElementById('api-text').innerText = "API ONLINE";

                lastRawStatus = data.status || "";
                updateStatusText(lastRawStatus);

                const currentThrows = data.throws || [];
                const lastThrows = lastApiData?.throws || [];

                if (gameActive && !isEditing && currentThrows.length > lastThrows.length) {
                    const latestThrow = currentThrows[currentThrows.length - 1];
                    const val = latestThrow.segment.number;     
                    const mult = latestThrow.segment.multiplier; 
                    const name = latestThrow.segment.name;      

                    if (gameState.dartsThisTurn.length < 3 && !gameState.isBust) {
                        addDart(val, mult, name);
                    }
                }

                const wasTakeout = lastApiData?.status === "Takeout" || lastApiData?.status === "Takeout in progress" || lastApiData?.status === "Takeout-in-progress";
                const isTakeout = lastRawStatus === "Takeout" || lastRawStatus === "Takeout in progress" || lastRawStatus === "Takeout-in-progress";
                const isStop = lastRawStatus === "Stop" || lastRawStatus === "Idle" || lastRawStatus === "Stopped";

                if (gameActive && !isEditing && wasTakeout && !isTakeout && !isStop) {
                    if (gameState.dartsThisTurn.length > 0 || gameState.isBust) {
                        switchPlayer();
                    }
                }

                lastApiData = data;
            } catch (err) {
                document.getElementById('api-dot').className = "dot off";
                document.getElementById('api-text').innerText = "API OFFLINE";
                lastRawStatus = "Offline";
                updateStatusText(lastRawStatus);
            }
        }

        // --- CORE SPIELLOGIK ---
        function addDart(val, mult, name) {
            if (gameState.dartsThisTurn.length >= 3 || gameState.isBust) return;
            gameState.dartsThisTurn.push({ val: val, mult: mult, name: name });
            evaluateTurn(name); 
        }

        function evaluateTurn(latestDartName = "") {
            let p = gameState.activePlayer;
            let currentScore = gameState.scoreAtStartOfTurn;
            gameState.isBust = false;

            for (let i = 0; i < gameState.dartsThisTurn.length; i++) {
                let d = gameState.dartsThisTurn[i];
                currentScore -= (d.val * d.mult);
                
                let isWin = false;
                if (currentScore === 0 && (settings.outRule === "straight" || d.mult === 2)) isWin = true;

                let isBust = false;
                if (currentScore < 0) isBust = true;
                if (settings.outRule === "double" && (currentScore === 1 || (currentScore === 0 && d.mult !== 2))) isBust = true;

                if (isBust) {
                    gameState.isBust = true;
                    currentScore = gameState.scoreAtStartOfTurn; 
                    if (i === gameState.dartsThisTurn.length - 1 && latestDartName) {
                        triggerPopup(latestDartName, true); 
                    }
                    break;
                }

                if (isWin) {
                    gameState.scores[p] = currentScore;
                    if (latestDartName) triggerPopup(latestDartName, false);
                    updateUI();
                    setTimeout(() => alert(`🎉 ${settings.playerNames[p]} ${dict[lang].alertWin}`), 500);
                    gameActive = false;
                    saveGameState(); 
                    return;
                }
            }

            if (!gameState.isBust && latestDartName) triggerPopup(latestDartName, false);
            gameState.scores[p] = currentScore;
            updateUI();
        }

        function switchPlayer() {
            let p = gameState.activePlayer;
            
            if (gameState.dartsThisTurn.length > 0) {
                let historyTurn = [...gameState.dartsThisTurn];
                if (gameState.isBust) historyTurn.push({ val: 0, mult: 0, name: "BUST!" });
                
                gameState.history[p].push(historyTurn);
                if (gameState.history[p].length > 5) gameState.history[p].shift();
            }

            gameState.activePlayer = p < settings.numPlayers ? p + 1 : 1;
            gameState.scoreAtStartOfTurn = gameState.scores[gameState.activePlayer];
            gameState.dartsThisTurn = [];
            gameState.isBust = false;
            updateUI();
        }

        function forceNextPlayer() { if (gameActive) switchPlayer(); }

        function resetTurn() {
            if (!gameActive || gameState.dartsThisTurn.length === 0) return;
            if (confirm(dict[lang].alertConfirmReset)) {
                gameState.dartsThisTurn = [];
                evaluateTurn(); 
            }
        }

        // --- EDITOR FUNKTIONEN ---
        function openEditModal() {
            if (!gameActive || gameState.dartsThisTurn.length === 0) {
                alert(dict[lang].alertNoDarts);
                return;
            }
            isEditing = true;
            
            const select = document.getElementById('edit-dart-index');
            select.innerHTML = '';
            gameState.dartsThisTurn.forEach((dart, index) => {
                select.innerHTML += `<option value="${index}">${dict[lang].dartPrefix} ${index + 1} (${dart.name})</option>`;
            });
            select.value = gameState.dartsThisTurn.length - 1; 

            setEditMult(1);
            document.getElementById('overlay').style.display = 'block';
        }

        function closeEditModal() { document.getElementById('overlay').style.display = 'none'; isEditing = false; }

        function setEditMult(mult) {
            currentEditMult = mult;
            document.getElementById('btn-mult-1').className = "mult-btn" + (mult === 1 ? " active" : "");
            document.getElementById('btn-mult-2').className = "mult-btn" + (mult === 2 ? " active" : "");
            document.getElementById('btn-mult-3').className = "mult-btn" + (mult === 3 ? " active" : "");
        }

        function saveEditedDart(val) {
            const index = parseInt(document.getElementById('edit-dart-index').value);
            let name = val === 0 ? "MISS" : val === 25 ? (currentEditMult === 2 ? "DBULL" : "BULL") : val.toString();
            if (val > 0 && val < 25) {
                if (currentEditMult === 1) name = "S" + name;
                if (currentEditMult === 2) name = "D" + name;
                if (currentEditMult === 3) name = "T" + name;
            }
            gameState.dartsThisTurn[index] = { val: val, mult: (val === 0 ? 1 : currentEditMult), name: name };
            evaluateTurn(name); 
            closeEditModal();
        }

        // --- UI UPDATE ---
        function updateUI() {
            const renderCurrentDarts = (darts, isBust) => {
                let html = darts.map(d => {
                    let extraClass = d.name === "MISS" ? "miss" : "";
                    return `<span class="dart-badge ${extraClass}">${d.name}</span>`;
                }).join('');
                if (isBust) html += `<span class="dart-badge bust">BUST!</span>`;
                return html;
            };

            const renderPastHistory = (histArray) => {
                return [...histArray].reverse().map(turn => {
                    let turnHtml = turn.map(d => {
                        let extraClass = d.name === "MISS" ? "miss" : (d.name === "BUST!" ? "bust" : "");
                        return `<span class="hist-badge ${extraClass}">${d.name}</span>`;
                    }).join('');
                    return `<div class="hist-row">${turnHtml}</div>`;
                }).join('');
            };

            for (let i = 1; i <= settings.numPlayers; i++) {
                const sEl = document.getElementById(`score${i}`);
                const pEl = document.getElementById(`player${i}`);
                const hEl = document.getElementById(`history${i}`);
                const phEl = document.getElementById(`past-history${i}`);
                
                if(!sEl) continue; 

                let isCurrent = (gameState.activePlayer === i);

                sEl.innerText = gameState.scores[i];
                sEl.classList.toggle('bust-text', gameState.isBust && isCurrent);
                pEl.classList.toggle('active', isCurrent);

                hEl.innerHTML = isCurrent ? renderCurrentDarts(gameState.dartsThisTurn, gameState.isBust) : "";
                phEl.innerHTML = renderPastHistory(gameState.history[i]);
            }

            if (gameActive) saveGameState();
        }

        // --- BOOT ROUTINE ---
        function initApp() {
            const savedPlayers = localStorage.getItem('ad_knownPlayers');
            if (savedPlayers) {
                knownPlayers = JSON.parse(savedPlayers);
                updateDatalist();
            }

            const savedLang = localStorage.getItem('ad_lang');
            if (savedLang) {
                document.getElementById('input-lang').value = savedLang;
                lang = savedLang;
            }

            const savedSettings = localStorage.getItem('ad_settings');
            if (savedSettings) {
                settings = JSON.parse(savedSettings);
                document.getElementById('input-numPlayers').value = settings.numPlayers || 2;
                document.getElementById('input-score').value = settings.startScore || 501;
                document.getElementById('input-out').value = settings.outRule || "double";
                
                if(settings.themeColor) {
                    document.getElementById('input-theme-color').value = settings.themeColor;
                }
            }

            applyColor();
            changeLang();

            const wasActive = localStorage.getItem('ad_gameActive') === 'true';
            if (wasActive) {
                const savedState = localStorage.getItem('ad_gameState');
                if (savedState) {
                    gameState = JSON.parse(savedState);
                    buildBoard();
                    document.getElementById('setup-screen').style.display = "none";
                    document.getElementById('game-screen').style.display = "block";
                    gameActive = true;
                    updateUI();
                }
            }
        }

        initApp();
        setInterval(update, 500);
    </script>
</body>
</html>
